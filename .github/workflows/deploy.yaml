name: Deploy to MyDevil

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Create deployment package
        run: |
          # Pakuj kod aplikacji Django — bez bazy danych, .env, logów, venv
          zip -r app.zip \
            app/ \
            agent_krypto/ \
            manage.py \
            passenger_wsgi.py \
            requirements.txt \
            -x "*.pyc" \
            -x "*__pycache__*" \
            -x "*.db" \
            -x "*.db-shm" \
            -x "*.db-wal" \
            -x "*.sqlite3" \
            -x "app/migrations/*.pyc"

      - name: Deploy to server
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_HOST: s84.mydevil.net
          DEPLOY_PATH: /usr/home/MagicParty/domains/agentkrypto.magicparty.usermd.net/public_python
          VENV_PIP: /usr/home/MagicParty/.virtualenv/agent-krypto/bin/pip
        run: |
          mkdir -p ~/.ssh

          # Retry ssh-keyscan up to 5 times (mydevil rate-limits SSH)
          for i in 1 2 3 4 5; do
            ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null && break
            echo "ssh-keyscan attempt $i failed, retrying in 15s..."
            sleep 15
          done

          SSH_CMD="sshpass -p $SSH_PASSWORD ssh -T -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST}"
          SCP_CMD="sshpass -p $SSH_PASSWORD scp -o StrictHostKeyChecking=no"

          # SCP with retry
          for i in 1 2 3; do
            $SCP_CMD app.zip ${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/ && break
            echo "scp attempt $i failed, retrying in 20s..."
            sleep 20
          done

          # Create remote deploy script
          cat > /tmp/deploy_remote.sh << 'SCRIPT'
          set -e
          DEPLOY_PATH=/usr/home/MagicParty/domains/agentkrypto.magicparty.usermd.net/public_python
          VENV_PIP=/usr/home/MagicParty/.virtualenv/agent-krypto/bin/pip
          VENV_PYTHON=/usr/home/MagicParty/.virtualenv/agent-krypto/bin/python3.12
          DOMAIN=agentkrypto.magicparty.usermd.net

          cd $DEPLOY_PATH
          if [ -f agent_krypto.db ]; then cp agent_krypto.db agent_krypto.db.backup; fi
          unzip -o app.zip
          rm -f app.zip
          if [ -f agent_krypto.db.backup ] && [ ! -f agent_krypto.db ]; then
            mv agent_krypto.db.backup agent_krypto.db
          else
            rm -f agent_krypto.db.backup
          fi
          $VENV_PIP install -r requirements.txt --quiet 2>/dev/null
          $VENV_PYTHON manage.py migrate --noinput 2>/dev/null || true
          $VENV_PYTHON manage.py collectstatic --noinput 2>/dev/null || true
          devil www restart $DOMAIN
          sleep 3
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://${DOMAIN}/)
          echo "Deploy completed! HTTP status: ${HTTP_CODE}"
          SCRIPT

          # SSH deploy with retry
          for i in 1 2 3; do
            $SSH_CMD < /tmp/deploy_remote.sh && break
            echo "SSH attempt $i failed, retrying in 20s..."
            sleep 20
          done
