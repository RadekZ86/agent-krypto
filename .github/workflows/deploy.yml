name: Deploy to MyDevil

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          zip -r app.zip app/ -x "*.pyc" -x "*__pycache__*"

      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: s84.mydevil.net
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "app.zip,requirements.txt"
          target: "~/domains/agentkrypto.magicparty.usermd.net/public_python/"

      - name: Install and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: s84.mydevil.net
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd ~/domains/agentkrypto.magicparty.usermd.net/public_python
            
            # Rozpakuj nowy kod
            unzip -o app.zip
            rm app.zip
            
            # Zainstaluj zależności
            pip install --user -r requirements.txt --quiet
            
            # Zatrzymaj obecny uvicorn i uruchom nowy
            pkill -f "uvicorn app.main:app.*12345" || true
            sleep 2
            nohup /home/MagicParty/.local/bin/uvicorn app.main:app --host 127.0.0.1 --port 12345 >> /tmp/uvicorn_agentkrypto.log 2>&1 &
            
            echo "Deploy completed!"
