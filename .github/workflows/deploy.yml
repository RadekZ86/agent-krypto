name: Deploy to MyDevil

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Create deployment package
        run: |
          # Pakuj tylko kod aplikacji — bez bazy danych, .env, logów, venv
          zip -r app.zip \
            app/ \
            requirements.txt \
            -x "*.pyc" \
            -x "*__pycache__*" \
            -x "*.db" \
            -x "*.db-shm" \
            -x "*.db-wal" \
            -x "*.sqlite3"

      - name: Deploy to server
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_HOST: s84.mydevil.net
          DEPLOY_PATH: /usr/home/MagicParty/domains/magicparty.usermd.net/public_python
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null
          
          sshpass -p "$SSH_PASSWORD" scp -o StrictHostKeyChecking=no app.zip ${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/
          
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} << ENDSSH
          set -e
          cd ${DEPLOY_PATH}

          # Zabezpiecz bazę danych przed nadpisaniem
          if [ -f agent_krypto.db ]; then
            cp agent_krypto.db agent_krypto.db.backup
          fi

          # Rozpakuj tylko kod (unzip -o nadpisuje pliki, ale bazy nie ma w zipie)
          unzip -o app.zip
          rm -f app.zip

          # Przywróć bazę na wypadek gdyby coś poszło nie tak
          if [ -f agent_krypto.db.backup ] && [ ! -f agent_krypto.db ]; then
            mv agent_krypto.db.backup agent_krypto.db
          else
            rm -f agent_krypto.db.backup
          fi

          # Instaluj zależności
          pip install --user -r requirements.txt --quiet 2>/dev/null

          # Restart uvicorn
          pkill -f "uvicorn app.main:app" || true
          sleep 2
          cd ${DEPLOY_PATH}
          nohup /home/MagicParty/.local/bin/uvicorn app.main:app --host 127.0.0.1 --port 12345 >> /tmp/uvicorn_agentkrypto.log 2>&1 &
          sleep 2

          # Weryfikacja
          HTTP_CODE=\$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:12345/)
          echo "Deploy completed! HTTP status: \${HTTP_CODE}"
          ENDSSH
